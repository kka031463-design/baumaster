<svg viewBox="0 0 500 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="БауМастер — строительная компания">

  <!-- ===== SYMBOL ===== -->

  <!-- Red left piece: chimney + left roof slope combined -->
  <polygon points="118,178 118,22 162,22 162,108 244,50 244,178" fill="#CC1111"/>

  <!-- Red diamond (rotated square at peak) -->
  <polygon points="244,50 302,108 244,166 186,108" fill="#CC1111"/>

  <!-- Dark gray right triangle (right slope) -->
  <polygon points="302,108 374,178 244,166" fill="#3D3D3D"/>

  <!-- ===== TEXT ===== -->

  <!-- "bau" gray + "master" red -->
  <text y="228" text-anchor="middle" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="48" x="246">
    <tspan fill="#3D3D3D" font-weight="400" letter-spacing="-0.5">bau</tspan><tspan fill="#CC1111" font-weight="700" letter-spacing="-0.5">master</tspan>
  </text>

  <!-- Subtitle -->
  <text x="246" y="258" text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13" fill="#888888" letter-spacing="3.5" font-weight="400">
    СТРОИТЕЛЬНАЯ КОМПАНИЯ
  </text>

</svg>
